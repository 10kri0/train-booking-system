{% extends 'base.html' %}
{% block title %}Edit Profile — RailBook{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header py-3">
                    <h5 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Edit Profile</h5>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('user.edit_profile') }}">
                        <div class="mb-3">
                            <label for="full_name" class="form-label fw-medium">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="full_name" name="full_name"
                                    value="{{ current_user.full_name }}" required />
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium text-muted">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control bg-light" value="{{ current_user.email }}"
                                    readonly disabled />
                            </div>
                            <div class="form-text">Email cannot be changed.</div>
                        </div>
                        <div class="mb-4">
                            <label for="phone" class="form-label fw-medium">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                <input type="tel" class="form-control" id="phone" name="phone"
                                    value="{{ current_user.phone }}" required />
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4 fw-semibold">
                                <i class="bi bi-check-lg me-1"></i>Save Changes
                            </button>
                            <a href="{{ url_for('user.profile') }}" class="btn btn-outline-secondary px-4">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
