{% extends 'base.html' %}
{% block title %}Change Password — RailBook{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card border-0 shadow-sm">
                <div class="card-header py-3">
                    <h5 class="mb-0"><i class="bi bi-key me-2"></i>Change Password</h5>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('user.change_password') }}">
                        <div class="mb-3">
                            <label for="old_password" class="form-label fw-medium">Current Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="old_password" name="old_password"
                                    placeholder="Enter current password" required />
                                <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePwd('old_password', this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="new_password" class="form-label fw-medium">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" class="form-control" id="new_password" name="new_password"
                                    placeholder="Minimum 6 characters" minlength="6" required />
                                <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePwd('new_password', this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label fw-medium">Confirm New Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" class="form-control" id="confirm_password"
                                    name="confirm_password" placeholder="Re-enter new password" required />
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning px-4 fw-semibold">
                                <i class="bi bi-check-lg me-1"></i>Change Password
                            </button>
                            <a href="{{ url_for('user.profile') }}" class="btn btn-outline-secondary px-4">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
