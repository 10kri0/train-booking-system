{% extends 'base.html' %}
{% block title %}Login — RailBook{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="auth-card shadow-lg mt-4">
                <div class="auth-card-header text-center">
                    <i class="bi bi-train-front-fill fs-2 mb-2"></i>
                    <h2 class="fw-bold mb-0">Welcome Back</h2>
                    <p class="text-muted mt-1">Sign in to your RailBook account</p>
                </div>
                <div class="auth-card-body p-4">
                    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-medium">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control" id="email" name="email"
                                    placeholder="you@example.com" required autofocus />
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label fw-medium">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password"
                                    placeholder="Your password" required />
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                                    onclick="togglePwd('password', this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="remember" id="remember" />
                                <label class="form-check-label" for="remember">Remember me</label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg fw-semibold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                        </button>
                    </form>
                    <hr class="my-4" />
                    <p class="text-center mb-0 text-muted">
                        Don't have an account?
                        <a href="{{ url_for('auth.register') }}" class="fw-semibold text-decoration-none">
                            Register here
                        </a>
                    </p>
                    <p class="text-center mt-2 mb-0">
                        <a href="{{ url_for('admin_bp.admin_login') }}" class="text-muted small">
                            <i class="bi bi-shield-lock me-1"></i>Admin Login
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
