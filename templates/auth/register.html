{% extends 'base.html' %}
{% block title %}Register — RailBook{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="auth-card shadow-lg mt-4">
                <div class="auth-card-header text-center">
                    <i class="bi bi-person-plus-fill fs-2 mb-2"></i>
                    <h2 class="fw-bold mb-0">Create Account</h2>
                    <p class="text-muted mt-1">Join RailBook and start booking today</p>
                </div>
                <div class="auth-card-body p-4">
                    <form method="POST" action="{{ url_for('auth.register') }}" novalidate id="registerForm">
                        <div class="mb-3">
                            <label for="full_name" class="form-label fw-medium">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="full_name" name="full_name"
                                    placeholder="Your full name" required autofocus />
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-medium">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control" id="email" name="email"
                                    placeholder="you@example.com" required />
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label fw-medium">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                <input type="tel" class="form-control" id="phone" name="phone"
                                    placeholder="10-digit phone number" pattern="[0-9]{10,15}" required />
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label fw-medium">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password"
                                    placeholder="Minimum 6 characters" minlength="6" required />
                                <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePwd('password', this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label fw-medium">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" class="form-control" id="confirm_password"
                                    name="confirm_password" placeholder="Re-enter your password" required />
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg fw-semibold">
                            <i class="bi bi-person-check me-2"></i>Create Account
                        </button>
                    </form>
                    <hr class="my-4" />
                    <p class="text-center mb-0 text-muted">
                        Already have an account?
                        <a href="{{ url_for('auth.login') }}" class="fw-semibold text-decoration-none">
                            Sign in here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
