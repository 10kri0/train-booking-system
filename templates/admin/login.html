{% extends 'base.html' %}
{% block title %}Admin Login — RailBook Admin{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="auth-card shadow-lg mt-4">
                <div class="auth-card-header text-center"
                    style="background: linear-gradient(135deg, #1a237e 0%, #283593 100%);">
                    <i class="bi bi-shield-lock-fill fs-2 mb-2"></i>
                    <h2 class="fw-bold mb-0">Admin Portal</h2>
                    <p class="mb-0 mt-1" style="opacity:0.8">RailBook Administration Panel</p>
                </div>
                <div class="auth-card-body p-4">
                    <div class="alert alert-info border-0 py-2 small">
                        <i class="bi bi-info-circle me-1"></i>
                        Default: <code>admin@trainbooking.com</code> / <code>Admin@123</code>
                    </div>
                    <form method="POST" action="{{ url_for('admin_bp.admin_login') }}">
                        <div class="mb-3">
                            <label for="email" class="form-label fw-medium">Admin Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                <input type="email" class="form-control" id="email" name="email"
                                    placeholder="admin@example.com" required autofocus />
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-medium">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password"
                                    placeholder="Admin password" required />
                                <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePwd('password', this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-dark w-100 btn-lg fw-semibold">
                            <i class="bi bi-shield-lock me-2"></i>Sign In as Admin
                        </button>
                    </form>
                    <hr class="my-4" />
                    <p class="text-center mb-0 small text-muted">
                        Not an admin?
                        <a href="{{ url_for('auth.login') }}" class="text-decoration-none">User Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
